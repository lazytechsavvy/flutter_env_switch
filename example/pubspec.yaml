name: flutter_env_switch_example
description: Example app demonstrating the flutter_env_switch package.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_env_switch:
    path: ../

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  shared_preferences: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/env/.env.dev
    - assets/env/.env.staging
    - assets/env/.env.production
