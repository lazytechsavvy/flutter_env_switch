name: flutter_env_switch
description: Type-safe runtime environment switcher for Flutter. Load .env files, switch configs at runtime, lock envs, and debug with a built-in panel.
version: 1.1.3
repository: https://github.com/lazytechsavvy/flutter_env_switch

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  dio: ^5.0.0
  flutter:
    sdk: flutter
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  # No package-level assets; host app declares its own .env assets
